name: Deploy Web UI — Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'web_ui/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject config
        run: |
          sed -i "s|{{REPO}}|${{ vars.TEAM_REPO || github.repository }}|g" web_ui/index.html
          sed -i "s|{{AZURE_FUNCTION_ENDPOINT}}|${{ vars.AZURE_FUNCTION_ENDPOINT }}|g" web_ui/index.html

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web_ui
          output_location: ''
